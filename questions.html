<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask a Question</title>

</head>
<body>

<header>
    <h1>Ask Your Questions</h1>
    <p>We would love to hear from you! Please fill out the form below.</p>
</header>

<section>
    <form action="/submit_question" method="post">
        <!-- Name Field -->
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required placeholder="Your Name" />

        <!-- Company Name Field -->
        <label for="company">Company Name:</label>
        <input type="text" id="company" name="company" placeholder="Your Company Name" />

        <!-- Email Field -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="Your Email Address" />

        <!-- Question Field -->
        <label for="question">Your Question:</label>
        <textarea id="question" name="question" required placeholder="Type your question here..." rows="4"></textarea>

        <!-- Submit Button -->
        <button type="submit">Submit</button>
    </form>
</section>

</body>
</html>
 <style>
    section {
    width: 80%;
    max-width: 600px;
    margin: auto;
    padding: 20px;
    background-color: #f9f9f9;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

form label {
    display: block;
    margin: 10px 0 5px;
    font-weight: bold;
}

form input, form textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    margin-bottom: 15px;
}

button {
    background-color: #4a90e2;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #357ABD;
}

 </style>

 <script>document.querySelector('form').addEventListener('submit', function(event) {
    event.preventDefault(); // Prevent default form submission
    const name = document.getElementById('name').value;
    const companyName = document.getElementById('company').value;
    const email = document.getElementById('email').value;
    const question = document.getElementById('question').value;

    console.log(`Name: ${name}, Company: ${companyName}, Email: ${email}, Question: ${question}`);
});
</script>
